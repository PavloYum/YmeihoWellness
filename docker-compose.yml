version: '3.8'

services:
  # The frontend container running Nginx and serving static files
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

  # The backend container running the Spring Boot application
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    # We do not expose the backend port 8080 to the host machine directly.
    # Nginx will proxy /api/ requests to the backend internal network on port 8080.
    ports:
      - "8080:8080" # Exposed optionally for direct testing, but 80 is the main entry point
