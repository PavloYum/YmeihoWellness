server.port=8080
spring.application.name=YumeihoWellness

# Optional: Disable caching for static resources during development
spring.web.resources.cache.cachecontrol.max-age=0

# ===============================
# EMAIL SETTINGS (Spring Mail)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587

# >>> ВПИШИТЕ ВАШ EMAIL И ПАРОЛЬ НИЖЕ <<<
# Ваш email-адрес (отправитель)
spring.mail.username=your.email@gmail.com
# Пароль для приложений (App Password), а не обычный пароль от почты!
spring.mail.password=your-app-password

# Настройки безопасности и протокола
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# ===============================

# Адрес, на который будут приходить заявки
app.notification.email=your.email@gmail.com
